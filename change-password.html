<!doctype html>
<html lang="en">
<head>

<link rel="icon" href="/favicon.ico" sizes="any">
  
  <script src="auth.js"></script>
  <script src="whitelabel.js"></script>
  <script>CIAuth.requireAuth();</script>

  <meta charset="utf-8" />

<title>CityIntel — Change Password</title>

<meta name="viewport" content="width=device-width, initial-scale=1" />

<meta property="og:title" content="CityIntel – Situational Intelligence" />
<meta property="og:description" content="Live alerts, incident monitoring, and risk intelligence for security and operations teams." />
<meta property="og:image" content="/CityintLogo.jpg" />
<meta property="og:type" content="website" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="theme-color" content="#9d2b2b" />

<!-- Browser favicon -->
<link rel="icon" href="/favicon.ico" sizes="any">

<!-- PNG fallback -->
<link rel="icon" type="image/png" href="/CityintLogo.jpg">

<!-- Apple iPhone / iPad -->
<link rel="apple-touch-icon" href="/CityintLogo.jpg">

<!-- Future Android / PWA -->
<link rel="manifest" href="/manifest.json">
  
  <style>
    :root{
      --brand-red:#D01616;--gray-900:#111214;--gray-800:#16171a;--gray-700:#1c1e22;
      --gray-600:#24272c;--gray-500:#2e3238;--text:#e9edf2;--muted:#8e97a3;
    }
    *{box-sizing:border-box}
    body{margin:0;font:14px/1.6 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:linear-gradient(180deg,var(--gray-900),var(--gray-800));color:var(--text)}
    .brandbar{display:flex;align-items:center;gap:10px;padding:12px 20px;
              background:linear-gradient(90deg,rgba(208,22,22,.2),rgba(208,22,22,0));
              border-bottom:1px solid var(--gray-600);position:sticky;top:0;z-index:10;
              background-color:rgba(17,18,20,.97)}
    .brandbar img{width:auto;height:44px;object-fit:contain;border-radius:6px;background:#fff}
    #topActions{margin-left:auto;position:relative;display:flex;align-items:center;gap:10px}
    .user{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:12px;
          background:#1c1e22;border:1px solid #24272c;cursor:pointer}
    .avatar{width:28px;height:28px;background:#fff;color:#000;border-radius:50%;
            display:grid;place-items:center;font-weight:700}
    .user-meta b{display:block;font-size:13px}
    .user-meta span{display:block;font-size:11px;color:var(--muted)}
    .dropdown{position:absolute;right:0;top:calc(100% + 6px);background:#1a1c20;
              border:1px solid #24272c;border-radius:10px;padding:6px 0;
              box-shadow:0 4px 12px rgba(0,0,0,.4);display:none;min-width:160px;z-index:50}
    .dropdown a{display:block;padding:8px 12px;color:var(--text);text-decoration:none;font-size:14px}
    .dropdown a:hover{background:rgba(255,255,255,.05)}
    .login-btn{display:inline-block;padding:8px 14px;border-radius:999px;
               background:var(--brand-red);border:1px solid #9c0f0f;color:#fff;
               font-weight:700;text-decoration:none}
    .wrap{max-width:520px;margin:48px auto;padding:0 20px}
    .page-title{font-size:22px;font-weight:800;margin:0 0 4px}
    .page-sub{color:var(--muted);margin:0 0 24px;font-size:13px}
    .card{background:linear-gradient(180deg,#1a1c20,#131417);
          border:1px solid var(--gray-600);border-radius:16px;padding:24px;
          box-shadow:0 8px 24px rgba(0,0,0,.3)}
    label{display:block;font-size:12px;font-weight:700;color:var(--muted);
          text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px}
    .field{margin-bottom:16px}
    input[type=password]{width:100%;padding:11px 12px;border-radius:10px;
                          border:1px solid var(--gray-500);background:var(--gray-700);
                          color:var(--text);font:inherit;outline:none}
    input[type=password]:focus{border-color:rgba(208,22,22,.6);
                                box-shadow:0 0 0 3px rgba(208,22,22,.12)}
    .btn{display:inline-flex;align-items:center;justify-content:center;
         padding:11px 20px;border-radius:12px;border:1px solid #9c0f0f;
         background:var(--brand-red);color:#fff;font-weight:800;font:inherit;
         cursor:pointer;width:100%;margin-top:4px;transition:opacity .15s}
    .btn:hover{opacity:.88}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .status{display:none;margin-top:12px;padding:10px 12px;border-radius:10px;
            border:1px solid var(--gray-500);font-size:13px}
    .status.ok{display:block;border-color:rgba(51,196,141,.4);background:rgba(51,196,141,.08);color:#bbf7d0}
    .status.err{display:block;border-color:rgba(255,90,95,.4);background:rgba(255,90,95,.08);color:#fecaca}
    .back{display:inline-block;margin-top:16px;color:var(--muted);font-size:13px;
          text-decoration:none}
    .back:hover{color:var(--text)}
  </style>
</head>
<body>

<div class="brandbar">
  <img src="CityintLogo.jpg" alt="CityIntel Logo">
  <div style="font-weight:700;font-size:17px">CityIntel</div>
  <div id="topActions"></div>
</div>

<div class="wrap">
  <h1 class="page-title">Change Password</h1>
  <p class="page-sub">Update your account password.</p>

  <div class="card">
    <div class="field">
      <label for="currentPass">Current password</label>
      <input type="password" id="currentPass" autocomplete="current-password" placeholder="Current password">
    </div>
    <div class="field">
      <label for="newPass">New password</label>
      <input type="password" id="newPass" autocomplete="new-password" placeholder="New password (min 8 characters)">
    </div>
    <div class="field">
      <label for="confirmPass">Confirm new password</label>
      <input type="password" id="confirmPass" autocomplete="new-password" placeholder="Confirm new password">
    </div>
    <button class="btn" id="submitBtn" onclick="changePassword()">Update password</button>
    <div class="status" id="statusMsg"></div>
  </div>
  <a class="back" href="settings.html">← Back to Settings</a>
</div>

<script src="shared-chip.js"></script>
<script>
function changePassword() {
  const current = document.getElementById('currentPass').value.trim();
  const newPass  = document.getElementById('newPass').value;
  const confirm  = document.getElementById('confirmPass').value;
  const btn      = document.getElementById('submitBtn');
  const status   = document.getElementById('statusMsg');

  status.className = 'status';
  status.style.display = 'none';

  if (!current || !newPass || !confirm) {
    status.className = 'status err';
    status.textContent = 'Please complete all three fields.';
    return;
  }
  if (newPass.length < 8) {
    status.className = 'status err';
    status.textContent = 'New password must be at least 8 characters.';
    return;
  }
  if (newPass !== confirm) {
    status.className = 'status err';
    status.textContent = 'New passwords do not match.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating…';

  const API = 'https://api.cityintelapi.com';
  const profile = JSON.parse(localStorage.getItem('ci_profile') || '{}');
  const email = profile.email || '';

  fetch(API + '/api/auth/change-password', {
    method: 'POST',
    headers: (window.CIAuth && CIAuth.headers) ? CIAuth.headers() : { 'Content-Type': 'application/json', 'X-User-Email': email },
    body: JSON.stringify({ email, currentPassword: current, newPassword: newPass })
  })
  .then(r => r.json())
  .then(data => {
    if (data.ok) {
      status.className = 'status ok';
      status.textContent = '✓ Password updated successfully.';
      document.getElementById('currentPass').value = '';
      document.getElementById('newPass').value = '';
      document.getElementById('confirmPass').value = '';
    } else {
      throw new Error(data.error || 'Could not update password.');
    }
  })
  .catch(err => {
    status.className = 'status err';
    status.textContent = err.message || 'An error occurred. Please try again.';
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = 'Update password';
  });
}
</script>
</body>
</html>
