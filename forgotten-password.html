<!doctype html>
<html lang="en">
<head>
  <meta property="og:title" content="CityIntel – Situational Intelligence" />
  <meta property="og:description" content="Live alerts, incident monitoring, and risk intelligence for security and operations teams." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta charset="utf-8" />
  <title>CityIntel — Forgotten Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --brand-red:#D01616;--gray-900:#111214;--gray-800:#16171a;--gray-700:#1c1e22;
      --gray-600:#24272c;--gray-500:#2e3238;--text:#e9edf2;--muted:#8e97a3;
    }
    *{box-sizing:border-box}
    body{margin:0;font:14px/1.6 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:linear-gradient(180deg,var(--gray-900),var(--gray-800));color:var(--text)}
    .brandbar{display:flex;align-items:center;gap:10px;padding:12px 20px;
              background-color:rgba(17,18,20,.97);
              background-image:linear-gradient(90deg,rgba(208,22,22,.2),rgba(208,22,22,0));
              border-bottom:1px solid var(--gray-600)}
    .brandbar img{width:auto;height:44px;object-fit:contain;border-radius:6px;background:#fff}
    .wrap{max-width:520px;margin:48px auto;padding:0 20px}
    .page-title{font-size:22px;font-weight:800;margin:0 0 4px}
    .page-sub{color:var(--muted);margin:0 0 24px;font-size:13px}
    .card{background:linear-gradient(180deg,#1a1c20,#131417);
          border:1px solid var(--gray-600);border-radius:16px;padding:24px;
          box-shadow:0 8px 24px rgba(0,0,0,.3)}
    label{display:block;font-size:12px;font-weight:700;color:var(--muted);
          text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px}
    .field{margin-bottom:16px}
    input[type=email]{width:100%;padding:11px 12px;border-radius:10px;
                       border:1px solid var(--gray-500);background:var(--gray-700);
                       color:var(--text);font:inherit;outline:none}
    input[type=email]:focus{border-color:rgba(208,22,22,.6);
                             box-shadow:0 0 0 3px rgba(208,22,22,.12)}
    .btn{display:inline-flex;align-items:center;justify-content:center;
         padding:11px 20px;border-radius:12px;border:1px solid #9c0f0f;
         background:var(--brand-red);color:#fff;font-weight:800;font:inherit;
         cursor:pointer;width:100%;margin-top:4px;transition:opacity .15s}
    .btn:hover{opacity:.88}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .status{display:none;margin-top:12px;padding:10px 12px;border-radius:10px;
            border:1px solid var(--gray-500);font-size:13px}
    .status.ok{display:block;border-color:rgba(51,196,141,.4);background:rgba(51,196,141,.08);color:#bbf7d0}
    .status.err{display:block;border-color:rgba(255,90,95,.4);background:rgba(255,90,95,.08);color:#fecaca}
    .links{margin-top:18px;display:flex;gap:16px;font-size:13px}
    .links a{color:var(--muted);text-decoration:none}
    .links a:hover{color:var(--text)}
  </style>
</head>
<body>

<div class="brandbar">
  <img src="CityintLogo.jpg" alt="CityIntel Logo">
  <div style="font-weight:700;font-size:17px">CityIntel</div>
</div>

<div class="wrap">
  <h1 class="page-title">Reset Password</h1>
  <p class="page-sub">Enter your registered email address and we'll send you a reset link.</p>

  <div class="card">
    <div class="field">
      <label for="emailInput">Email address</label>
      <input type="email" id="emailInput" autocomplete="email" placeholder="you@company.com">
    </div>
    <button class="btn" id="submitBtn" onclick="sendReset()">Send reset link</button>
    <div class="status" id="statusMsg"></div>
  </div>

  <div class="links">
    <a href="login.html">← Back to login</a>
    <a href="subscribe.html">Request access</a>
  </div>
</div>

<script src="auth.js"></script>
<script>
function sendReset() {
  const email  = document.getElementById('emailInput').value.trim();
  const btn    = document.getElementById('submitBtn');
  const status = document.getElementById('statusMsg');

  status.className = 'status';
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    status.className = 'status err';
    status.textContent = 'Please enter a valid email address.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';

  fetch('https://api.cityintelapi.com/api/auth/forgot-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  })
  .then(r => r.json())
  .then(() => {
    // Always show success to avoid email enumeration
    status.className = 'status ok';
    status.textContent = '✓ If an account exists for that email, a reset link has been sent. Check your inbox.';
    document.getElementById('emailInput').value = '';
  })
  .catch(() => {
    status.className = 'status ok';
    status.textContent = '✓ If an account exists for that email, a reset link has been sent. Check your inbox.';
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  });
}
</script>
</body>
</html>
