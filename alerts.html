<script>
(function pageGuard(){
  const NEED_LOGIN = true;          // this page requires a login
  const NEED_SUB = false;           // set to true on pages that require an active sub

  // Must be logged in?
  if (NEED_LOGIN && (!window.CIAuth || !CIAuth.isLoggedIn())) {
    const here = location.pathname.split('/').pop() || 'index.html';
    const next = encodeURIComponent(here + location.search + location.hash);
    location.href = 'login.html?next=' + next;
    return;
  }

  // Must be subscribed?
  if (NEED_SUB) {
    const isSub = localStorage.getItem('ci_subscribed') === 'true';
    if (!isSub) {
      location.href = 'subscribe.html';
      return;
    }
  }
})();
</script>


	
<script>
(function compatProfileShim(){
  if (!window.CIAuth || !CIAuth.isLoggedIn()) return;

    name: u.name || 'CityIntel User',
    email: u.email,
    role: u.role || 'Admin',
    is_admin: (u.role||'').toLowerCase()==='admin'
  }));
  // Do NOT auto-set ci_subscribed here anymore
})();
</script>

	<script>
  (function renderAlerts() {
    const feed = document.getElementById('alertsFeed');
    const meta = document.getElementById('alertsFeedMeta');
    const countrySelect = document.getElementById('feedCountryFilter');
    const citySelect = document.getElementById('feedCityFilter');
    const riskSelect = document.getElementById('feedRiskFilter');
    const windowSelect = document.getElementById('feedWindowFilter');
    const resetBtn = document.getElementById('feedClearFilters');
    const context = document.getElementById('incidentSnapshot');
    if (!feed) return;

    const params = new URLSearchParams(window.location.search);
    const searchQ    = (params.get('search')    || '').trim().toLowerCase();
    const continentQ = (params.get('continent') || '').trim().toLowerCase();
    const countryQ   = (params.get('country')   || '').trim();
    const cityQ      = (params.get('city')      || '').trim();
    const riskParam  = (params.get('risk')      || '').trim().toLowerCase();
    const windowParam = (params.get('window') || params.get('range') || '').trim().toLowerCase();
    const fromBrief  = (params.get('from')      || '') === 'brief';

    const normalizeRisk = (r) => {
      const s = String(r || '').toLowerCase();
      if (s.startsWith('hi')) return 'high';
      if (s.startsWith('me')) return 'med';
      if (s.startsWith('lo')) return 'low';
      return '';
    };

    const riskLabel = (r) => r === 'high' ? 'High' : r === 'med' ? 'Medium' : 'Low';
    const riskClass = (r) => r === 'high' ? 'high' : r === 'med' ? 'med' : 'low';

    const parseDate = (a) => {
      const d = new Date(a.time || a.datetime || a.date || a.when);
      return isNaN(d) ? null : d;
    };

    const countryOf = (a) => (a.country || a.Country || a.location || '').trim();
    const cityOf = (a) => (a.city || '').trim();
    const textOf = (a) => `${a.title || ''} ${a.summary || ''} ${cityOf(a)} ${countryOf(a)}`.toLowerCase();

    let requestedRisk = '';
    if (riskParam) {
      if (riskParam.startsWith('hi')) requestedRisk = 'high';
      else if (riskParam.startsWith('me')) requestedRisk = 'med';
      else if (riskParam.startsWith('lo')) requestedRisk = 'low';
    }

    function defaultWindow(){
      if (windowParam === 'month' || params.get('month') === 'current') return 'month';
      if (windowParam === 'next-month' || params.get('month') === 'next') return 'next-month';
      return '7d';
    }

    const data = Array.isArray(window.alertsData) ? window.alertsData : [];
    const baseAlerts = data.map(a => {
      const risk = normalizeRisk(a.risk);
      const dt = parseDate(a);
      const cont = (a.continent || a.Continent || '').toLowerCase();
      return { ...a, risk, _dt: dt, _continent: cont };
    }).filter(a => a._dt && !isNaN(a._dt));

    function getWindow(value){
      const now = new Date();
      if (value === 'month') {
        return {
          label: `Remaining ${now.toLocaleString('en-GB', {month:'long'})}`,
          start: now,
          end: new Date(now.getFullYear(), now.getMonth() + 1, 1)
        };
      }
      if (value === 'next-month') {
        const s = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        return {
          label: `Next month (${s.toLocaleString('en-GB', {month:'long'})})`,
          start: s,
          end: new Date(now.getFullYear(), now.getMonth() + 2, 1)
        };
      }
      return {
        label: 'Next 7 days',
        start: now,
        end: new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000)
      };
    }

    function populateCountryOptions(rows){
      if (!countrySelect) return;
      const current = countrySelect.value || countryQ;
      const countries = [...new Set(rows.map(countryOf).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
      countrySelect.innerHTML = `<option value="">All countries</option>` + countries.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
      if (current && countries.includes(current)) countrySelect.value = current;
    }

    function populateCityOptions(rows){
      if (!citySelect) return;
      const current = citySelect.value || cityQ;
      const selectedCountry = (countrySelect?.value || countryQ || '').trim().toLowerCase();
      const cityRows = rows.filter(a => !selectedCountry || countryOf(a).toLowerCase() === selectedCountry);
      const cities = [...new Set(cityRows.map(cityOf).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
      citySelect.innerHTML = `<option value="">All cities</option>` + cities.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
      if (current && cities.includes(current)) citySelect.value = current;
      else citySelect.value = '';
    }

    function escapeHtml(str){
      return String(str || '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
    }

    function updateUrlState(){
      const url = new URL(window.location.href);
      const w = windowSelect?.value || '7d';
      const co = countrySelect?.value || '';
      const c = citySelect?.value || '';
      const r = riskSelect?.value || '';
      url.searchParams.delete('month');
      url.searchParams.delete('window');
      url.searchParams.delete('country');
      url.searchParams.delete('city');
      url.searchParams.delete('risk');
      if (w !== '7d') url.searchParams.set('window', w);
      if (co) url.searchParams.set('country', co);
      if (c) url.searchParams.set('city', c);
      if (r) url.searchParams.set('risk', r);
      history.replaceState(null, '', url.toString());
    }

    function render(){
      const selectedWindow = windowSelect?.value || '7d';
      const selectedCountry = (countrySelect?.value || '').trim().toLowerCase();
      const selectedCity = (citySelect?.value || '').trim().toLowerCase();
      const selectedRisk = (riskSelect?.value || '').trim().toLowerCase();
      const win = getWindow(selectedWindow);

      const windowRows = baseAlerts
        .filter(a => a._dt >= win.start && a._dt < win.end)
        .filter(a => !continentQ || a._continent === continentQ)
        .filter(a => !searchQ || textOf(a).includes(searchQ))
        .sort((a,b) => a._dt - b._dt);

      populateCountryOptions(windowRows);
      populateCityOptions(windowRows);

      let alerts = windowRows
        .filter(a => !selectedCountry || countryOf(a).toLowerCase() === selectedCountry)
        .filter(a => !selectedCity || cityOf(a).toLowerCase() === selectedCity)
        .filter(a => !selectedRisk || a.risk === selectedRisk);

      feed.innerHTML = '';

      if (meta) {
        const countryTxt = selectedCountry ? ` • ${countrySelect.value}` : '';
        const cityTxt = selectedCity ? ` • ${citySelect.value}` : '';
        const riskTxt = selectedRisk ? ` • ${riskLabel(selectedRisk)} risk` : ' • all risk levels';
        meta.textContent = `Showing ${alerts.length} protest event${alerts.length !== 1 ? 's' : ''} • ${win.label}${countryTxt}${cityTxt}${riskTxt}`;
      }

      if (!alerts.length) {
        feed.innerHTML = `<p style="color:#8e97a3">No protest events matching the selected filters.</p>`;
        return;
      }

      alerts.forEach(a => {
        const pretty = a._dt.toLocaleString('en-GB', {
          timeZone: 'Europe/London',
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });

        const country = countryOf(a);
        const city = cityOf(a);
        const placeTitle = [city, country].filter(Boolean).join(', ') || 'Unknown location';

        const card = document.createElement('div');
        card.className = `alert ${riskClass(a.risk)}`;
        card.innerHTML = `
          <strong>${escapeHtml(placeTitle)} — ${escapeHtml(a.title || 'Untitled event')}</strong>
          <div style="color:#8e97a3;font-size:12px;margin:2px 0 8px">
            ${pretty} • ${riskLabel(a.risk)} risk
          </div>
          <p style="margin:0">${escapeHtml(a.summary || '')}</p>
          <div class="alert-actions">
            ${a.source ? `<a href="${escapeHtml(a.source)}" target="_blank" rel="noopener" class="btn">View source</a>` : ''}
          </div>
        `;

        card.style.cursor = 'pointer';
        card.addEventListener('click', () => {
          const q = new URLSearchParams();
          q.set('search', a.title || '');
          q.set('city', city || '');
          q.set('country', country || '');
          q.set('time', a.time || a.datetime || a.date || a.when || '');
          q.set('risk', a.risk || '');
          q.set('from', 'alerts');
          location.href = 'incident.html?' + q.toString();
        });

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn-brief';
        btn.textContent = 'Add to Brief';
        btn.onclick = (e) => {
          e.stopPropagation();
          const existing = localStorage.getItem('ci_brief_pad') || '';
          const line = `${a.title || ''} — ${placeTitle}\n`;
          localStorage.setItem('ci_brief_pad', existing + line);
          btn.textContent = 'Added ✓';
          btn.classList.add('added');
        };
        const actions = card.querySelector('.alert-actions');
        if (actions) actions.appendChild(btn);

        feed.appendChild(card);
      });

      updateUrlState();
    }

    if (windowSelect) windowSelect.value = defaultWindow();
    if (riskSelect && requestedRisk) riskSelect.value = requestedRisk;

    // Build country/city options from the default window before applying query params.
    const initialWin = getWindow(windowSelect?.value || '7d');
    const initialRows = baseAlerts.filter(a => a._dt >= initialWin.start && a._dt < initialWin.end);
    populateCountryOptions(initialRows);
    if (countrySelect && countryQ) countrySelect.value = countryQ;
    populateCityOptions(initialRows);
    if (citySelect && cityQ) citySelect.value = cityQ;

    if (countrySelect) {
      countrySelect.addEventListener('change', () => {
        if (citySelect) citySelect.value = '';
        render();
      });
    }
    [windowSelect, citySelect, riskSelect].forEach(el => {
      if (el) el.addEventListener('change', render);
    });

    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        if (windowSelect) windowSelect.value = '7d';
        if (countrySelect) countrySelect.value = '';
        if (citySelect) citySelect.value = '';
        if (riskSelect) riskSelect.value = '';
        render();
      });
    }

    // Keep brief snapshot support for inbound links, but do not force high-only feed.
    if (fromBrief && searchQ && context) {
      const primary = baseAlerts.find(a => (a.title || '').toLowerCase().includes(searchQ));
      if (primary) context.style.display = 'block';
    }

    render();
  })();
</script>






 <script>
(function mountTopActions(){
  const host = document.getElementById('topActions');
  if (!host) return;

  const initialsOf = (nameOrEmail='CI') => {
    const s = String(nameOrEmail).trim();
    if (!s) return 'CI';
    if (s.includes('@')) return s[0].toUpperCase();
    const parts = s.split(/\s+/);
    return (parts[0]?.[0] || 'C').toUpperCase() + (parts[1]?.[0] || 'I').toUpperCase();
  };

  if (window.CIAuth && CIAuth.isLoggedIn()) {
    const u = CIAuth.who();
    const initials = initialsOf(u.name || u.email);
    const role = u.roleLabel || u.role || 'Member';
    const isMaster = CIAuth.isMasterAdmin();

    host.innerHTML = `
      <div class="user" id="userChip" style="cursor:pointer">
        <div class="avatar">${initials}</div>
        ${role}
      </div>
      <div class="dropdown" id="userMenu">
        ${isMaster ? `<a href="analytics.html">Analytics</a><a href="system-flow.html">System Flow</a><a href="operationslog.html">Operations Log</a>` : ``}
        <a href="settings.html">Manage Billing</a>
        <a href="#" id="logoutLink">Log out</a>
      </div>
    `;

    const chip = document.getElementById('userChip');
    const menu = document.getElementById('userMenu');

    chip.addEventListener('click', () => {
      menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    });

    document.addEventListener('click', (e) => {
      if (!host.contains(e.target)) menu.style.display = 'none';
    });

    document.getElementById('logoutLink').addEventListener('click', (e) => {
      e.preventDefault();
      try { CIAuth.logout(); } catch(_) {}
      location.href = 'index.html';
    });
  } else {
    const here = location.pathname.split('/').pop() || 'index.html';
    const next = encodeURIComponent(here + location.search + location.hash);
    host.innerHTML = `<a class="login-btn" href="login.html?next=${next}">Log in</a>`;
  }
})();
</script>

	<script>
(function(){
  const API_BASE = 'https://api.cityintelapi.com';
  const bar = document.getElementById('trial-banner');
  const txt = document.getElementById('trial-text');

  function who(){ try { return JSON.parse(localStorage.getItem('ci_profile')||'{}'); } catch { return {}; } }
  function pad(n){ return String(n).padStart(2,'0'); }

  async function getStatus(email){
    const u = new URL(API_BASE + '/api/sub-status');
    u.searchParams.set('email', email);
    const r = await fetch(u);
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }

  function startCountdown(endIso){
    const end = new Date(endIso).getTime();
    function tick(){
      const now = Date.now();
      const ms = end - now;
      if (ms <= 0){
        // trial ended → bounce to subscribe
        bar.style.display = 'none';
        location.href = 'subscribe.html?reason=trial_ended';
        return;
      }
      const s = Math.floor(ms/1000);
      const d = Math.floor(s/86400);
      const h = Math.floor((s%86400)/3600);
      const m = Math.floor((s%3600)/60);
      const sec = s%60;
      const parts = [];
      if (d) parts.push(d+'d');
      parts.push(pad(h)+'h', pad(m)+'m', pad(sec)+'s');
      txt.textContent = 'Trial active — ends in ' + parts.join(' ');
      bar.style.display = '';
    }
    tick();
    return setInterval(tick, 1000);
  }

  (async function init(){
    const p = who();
    if (!p.email) return; // not logged in

    try{
      const data = await getStatus(p.email);
      if (data.trialEndsAt){
        startCountdown(data.trialEndsAt);
      }
    }catch(e){
      // silent
      console.warn('trial banner error', e);
    }
  })();
})();
</script>

<script>
(function(){
  function hideNavLink(href){
    const link = document.querySelector(`aside.sidebar nav a[href="${href}"]`);
    if (link) link.style.display = 'none';
  }

  function showNavLink(href){
    const link = document.querySelector(`aside.sidebar nav a[href="${href}"]`);
    if (link) link.style.display = '';
  }

  function applyRoleNav(){
    if (!window.CIAuth || !CIAuth.isLoggedIn()) return;

    const isMaster = CIAuth.isMasterAdmin();
    const isOrgAdmin = CIAuth.isOrgAdmin();
    const isOperator = CIAuth.isOperator();

    // start by showing everything, then hide by role
    [
      'assets.html',
      'travellers.html',
      'sources.html',
      'analytics.html',
      'operationslog.html',
      'system-flow.html'
    ].forEach(showNavLink);

    if (isMaster) {
      return; // master sees all
    }

    if (isOrgAdmin) {
      hideNavLink('sources.html');
      hideNavLink('analytics.html');
      hideNavLink('operationslog.html');
      hideNavLink('system-flow.html');
      return;
    }

    if (isOperator) {
      hideNavLink('assets.html');
      hideNavLink('travellers.html');
      hideNavLink('sources.html');
      hideNavLink('analytics.html');
      hideNavLink('operationslog.html');
      hideNavLink('system-flow.html');
      return;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyRoleNav);
  } else {
    applyRoleNav();
  }
})();
</script>
